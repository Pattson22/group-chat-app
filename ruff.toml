# Matches the codebase's existing style (black-like, ~120-col lines).
line-length = 120
# Deliberately conservative (the app runs on 3.14): keeps the formatter from
# rewriting code into 3.14-only syntax like PEP 758 parenthesis-free except.
target-version = "py312"

# Only lint/format first-party code, not migrations' autogenerated boilerplate.
extend-exclude = ["alembic/versions"]

[lint]
# Defaults (pyflakes + pycodestyle errors) plus import sorting and bugbear.
extend-select = ["I", "B"]
# B008 flags FastAPI's standard `param = Depends(...)` idiom; not a bug here.
ignore = ["B008"]

[lint.isort]
known-first-party = ["app", "tests"]

[lint.per-file-ignores]
# conftest.py intentionally sets DATABASE_URL before app imports (E402).
"tests/conftest.py" = ["E402"]
