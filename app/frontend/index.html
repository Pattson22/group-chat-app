<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Project Chat</title>
        <link rel="stylesheet" href="/static/styles.css" />
    </head>
    <body>
        <div class="app">
            <!-- Phone entry -->
            <div id="view-phone" class="screen">
                <div class="auth-card">
                    <h1>Group Project Chat</h1>
                    <p class="subtitle">Enter your phone number to get started</p>
                    <input type="tel" id="phoneInput" placeholder="+15551234567" autocomplete="tel" />
                    <div id="phoneError" class="error-text"></div>
                    <button id="sendCodeBtn">Send Code</button>
                </div>
            </div>

            <!-- OTP entry -->
            <div id="view-otp" class="screen" hidden>
                <div class="auth-card">
                    <h1>Enter Code</h1>
                    <p class="subtitle">We sent a code to <span id="otpPhoneLabel"></span></p>
                    <div id="devCodeHint" class="dev-hint" hidden></div>
                    <input
                        type="text"
                        id="otpInput"
                        placeholder="6-digit code"
                        autocomplete="one-time-code"
                        inputmode="numeric"
                        maxlength="6"
                    />
                    <div id="otpError" class="error-text"></div>
                    <button id="verifyCodeBtn">Verify</button>
                    <button id="backToPhoneBtn" class="secondary">Use a different number</button>
                </div>
            </div>

            <!-- Display name setup (first login only) -->
            <div id="view-profile" class="screen" hidden>
                <div class="auth-card">
                    <h1>Choose a name</h1>
                    <p class="subtitle">This is what other people will see</p>
                    <input type="text" id="displayNameInput" placeholder="Your name" />
                    <div id="profileError" class="error-text"></div>
                    <button id="saveProfileBtn">Continue</button>
                </div>
            </div>

            <!-- Inbox -->
            <div id="view-inbox" class="screen" hidden>
                <div class="inbox-layout">
                    <div class="inbox-header">
                        <h2 id="meLabel"></h2>
                        <div class="inbox-actions">
                            <button id="newChatBtn" class="icon-btn">New chat</button>
                            <button id="newGroupBtn" class="icon-btn">New group</button>
                            <button id="logoutBtn" class="icon-btn">Log out</button>
                        </div>
                    </div>

                    <div id="newChatPanel" class="inline-panel" hidden>
                        <input type="tel" id="newChatPhoneInput" placeholder="Phone number, e.g. +15551234567" />
                        <div id="newChatError" class="error-text"></div>
                        <div class="panel-actions">
                            <button id="newChatSubmitBtn">Start chat</button>
                            <button id="newChatCancelBtn" class="secondary">Cancel</button>
                        </div>
                    </div>

                    <div id="newGroupPanel" class="inline-panel" hidden>
                        <input type="text" id="newGroupNameInput" placeholder="Group name" />
                        <input type="text" id="newGroupMembersInput" placeholder="Member phone numbers, comma separated" />
                        <div id="newGroupError" class="error-text"></div>
                        <div class="panel-actions">
                            <button id="newGroupSubmitBtn">Create group</button>
                            <button id="newGroupCancelBtn" class="secondary">Cancel</button>
                        </div>
                    </div>

                    <ul id="conversationList" class="conversation-list"></ul>
                </div>
            </div>

            <!-- Conversation -->
            <div id="view-chat" class="screen" hidden>
                <div class="chat-layout">
                    <div class="chat-header">
                        <button id="backToInboxBtn" class="icon-btn">&larr;</button>
                        <h2 id="chatTitle"></h2>
                    </div>
                    <button id="loadOlderBtn" class="load-older" hidden type="button">Load older messages</button>
                    <div id="messagesContainer" class="messages-container">
                        <ul id="messages"></ul>
                    </div>
                    <div id="chatError" class="error-text"></div>
                    <form id="messageForm" class="input-area">
                        <input
                            type="file"
                            id="fileInput"
                            accept="image/jpeg,image/png,image/gif,image/webp,application/pdf,text/plain"
                            hidden
                        />
                        <button type="button" id="attachBtn" class="icon-btn" title="Attach a file">📎</button>
                        <input type="text" id="messageText" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit">Send</button>
                    </form>
                </div>
            </div>
        </div>

        <script src="/static/app.js"></script>
    </body>
</html>
