<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Patschat</title>
        <link rel="icon" href="/static/favicon.ico" sizes="any" />
        <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
        <link rel="stylesheet" href="/static/styles.css" />
    </head>
    <body>
        <div class="app">
            <!-- Phone entry -->
            <div id="view-phone" class="screen">
                <div class="auth-card">
                    <h1>Patschat</h1>
                    <p class="subtitle">Enter your phone number to get started</p>
                    <input type="tel" id="phoneInput" placeholder="+15551234567" autocomplete="tel" />
                    <div id="phoneError" class="error-text"></div>
                    <button id="sendCodeBtn">Send Code</button>
                </div>
            </div>

            <!-- OTP entry -->
            <div id="view-otp" class="screen" hidden>
                <div class="auth-card">
                    <h1>Enter Code</h1>
                    <p class="subtitle">We sent a code to <span id="otpPhoneLabel"></span></p>
                    <div id="devCodeHint" class="dev-hint" hidden></div>
                    <input
                        type="text"
                        id="otpInput"
                        placeholder="6-digit code"
                        autocomplete="one-time-code"
                        inputmode="numeric"
                        maxlength="6"
                    />
                    <div id="otpError" class="error-text"></div>
                    <button id="verifyCodeBtn">Verify</button>
                    <button id="backToPhoneBtn" class="secondary">Use a different number</button>
                </div>
            </div>

            <!-- Display name setup (first login only) -->
            <div id="view-profile" class="screen" hidden>
                <div class="auth-card">
                    <h1>Choose a name</h1>
                    <p class="subtitle">This is what other people will see</p>
                    <input type="text" id="displayNameInput" placeholder="Your name" />
                    <div id="profileError" class="error-text"></div>
                    <button id="saveProfileBtn">Continue</button>
                </div>
            </div>

            <!-- Inbox -->
            <div id="view-inbox" class="screen" hidden>
                <div class="inbox-layout">
                    <div class="inbox-header">
                        <h2 id="meLabel"></h2>
                        <div class="inbox-actions">
                            <button id="newChatBtn" class="icon-btn">New chat</button>
                            <button id="newGroupBtn" class="icon-btn">New group</button>
                            <button id="logoutBtn" class="icon-btn">Log out</button>
                        </div>
                    </div>

                    <div id="newChatPanel" class="inline-panel" hidden>
                        <input type="tel" id="newChatPhoneInput" placeholder="Phone number, e.g. +15551234567" />
                        <div id="newChatError" class="error-text"></div>
                        <div class="panel-actions">
                            <button id="newChatSubmitBtn">Start chat</button>
                            <button id="newChatCancelBtn" class="secondary">Cancel</button>
                        </div>
                    </div>

                    <div id="newGroupPanel" class="inline-panel" hidden>
                        <input type="text" id="newGroupNameInput" placeholder="Group name" />
                        <input type="text" id="newGroupMembersInput" placeholder="Member phone numbers, comma separated" />
                        <div id="newGroupError" class="error-text"></div>
                        <div class="panel-actions">
                            <button id="newGroupSubmitBtn">Create group</button>
                            <button id="newGroupCancelBtn" class="secondary">Cancel</button>
                        </div>
                    </div>

                    <ul id="conversationList" class="conversation-list"></ul>
                </div>
            </div>

            <!-- Conversation -->
            <div id="view-chat" class="screen" hidden>
                <div class="chat-layout">
                    <div class="chat-header">
                        <button id="backToInboxBtn" class="icon-btn" title="Back to inbox" aria-label="Back to inbox">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <h2 id="chatTitle"></h2>
                        <button id="audioCallBtn" class="icon-btn" title="Start audio call" aria-label="Start audio call">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        </button>
                        <button id="videoCallBtn" class="icon-btn" title="Start video call" aria-label="Start video call">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                        </button>
                    </div>
                    <button id="loadOlderBtn" class="load-older" hidden type="button">Load older messages</button>
                    <div id="messagesContainer" class="messages-container">
                        <ul id="messages"></ul>
                    </div>
                    <div id="chatError" class="error-text"></div>
                    <form id="messageForm" class="input-area">
                        <input
                            type="file"
                            id="fileInput"
                            accept="image/jpeg,image/png,image/gif,image/webp,application/pdf,text/plain"
                            hidden
                        />
                        <button type="button" id="attachBtn" class="icon-btn" title="Attach a file" aria-label="Attach a file">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </button>
                        <input type="text" id="messageText" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit">Send</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Call overlay: intentionally NOT a .screen -- it must stay
             visible/hidden independently of whichever screen (inbox, a
             conversation, etc.) is currently showing, since a call can
             arrive from anywhere in the app. -->
        <div id="callOverlay" class="call-overlay" hidden>
            <div class="call-overlay-inner">
                <div id="callRingingView" class="call-ringing" hidden>
                    <div id="callAvatar" class="call-avatar"></div>
                    <div id="callPeerName" class="call-peer-name"></div>
                    <div id="callStatusText" class="call-status-text"></div>
                    <div class="call-ringing-actions">
                        <button id="callDeclineBtn" class="call-control call-control-decline" hidden title="Decline" aria-label="Decline call">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                        <button id="callAcceptBtn" class="call-control call-control-accept" hidden title="Accept" aria-label="Accept call">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        </button>
                        <button id="callCancelBtn" class="call-control call-control-decline" hidden title="Cancel" aria-label="Cancel call">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <div id="callActiveView" class="call-active" hidden>
                    <div id="callGrid" class="call-grid"></div>
                    <div class="call-controls">
                        <button id="callMuteBtn" class="call-control" title="Mute" aria-label="Mute microphone">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>
                        <button id="callCameraBtn" class="call-control" title="Toggle camera" aria-label="Toggle camera" hidden>
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                        </button>
                        <button id="callHangupBtn" class="call-control call-control-decline" title="Hang up" aria-label="Hang up">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="/static/app.js"></script>
        <script src="/static/calls.js"></script>
    </body>
</html>
